<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Request System — IMC</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body {font-family:Arial;background:#f4f7fb;margin:0;padding:20px;}
.panel {background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;}
button {padding:10px 15px;margin:5px;cursor:pointer;}
</style>
</head>

<body>

<h2>Travel Request System</h2>

<div class="panel">
  <input id="empName" placeholder="Employee Name"><br>
  <input id="empEmail" placeholder="Employee Email"><br>
  <input id="supEmail" placeholder="Supervisor Email"><br>
  <button onclick="submitEmployeeForm()">Submit</button>
</div>

<div class="panel" id="approvalPanel" style="display:none;">
  <h3>Approval Panel</h3>
  <div id="summary"></div>
  <button onclick="approve()">Approve</button>
</div>

<script>
// ================= EMAILJS (UNCHANGED) =================
const EMAILJS_PUBLIC_KEY  = '0EeAOuTRgEkvPZuYn';
const EMAILJS_SERVICE_ID  = 'service_i1t9kqb';
const EMAILJS_TEMPLATE_ID = 'template_y7ihtnf';

emailjs.init(EMAILJS_PUBLIC_KEY);

// ================= STATE =================
const S = {
  reqId:'',
  emp:{},
  sup:{}
};

// ================= JSONBIN =================
const JSONBIN_BASE = 'https://api.jsonbin.io/v3/b';

function saveBinId(reqId, binId){
  localStorage.setItem('bin_'+reqId, binId);
}
function getBinId(reqId){
  return localStorage.getItem('bin_'+reqId);
}

// ================= GENERATE ID =================
function generateId(){
  return 'TRF-' + Date.now();
}

// ================= SAVE CLOUD =================
async function saveStateCloud(){
  const res = await fetch(JSONBIN_BASE,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'X-Bin-Private':'false'
    },
    body:JSON.stringify(S)
  });

  const j = await res.json();
  const binId = j.metadata.id;
  saveBinId(S.reqId, binId);
}

// ================= LOAD CLOUD =================
async function loadStateCloud(binId){
  const res = await fetch(`${JSONBIN_BASE}/${binId}/latest`);
  const j = await res.json();
  return j.record;
}

// ================= SHORT LINK =================
async function approvalLink(stage){
  await saveStateCloud();

  let binId = getBinId(S.reqId);

  let attempts = 0;
  while(!binId && attempts < 5){
    await new Promise(r=>setTimeout(r,500));
    binId = getBinId(S.reqId);
    attempts++;
  }

  if(!binId) throw new Error("No binId");

  const base = window.location.href.split('?')[0];
  return `${base}?b=${binId}&s=${stage}`;
}

// ================= SUBMIT =================
async function submitEmployeeForm(){

  S.reqId = generateId();

  S.emp = {
    name: empName.value,
    email: empEmail.value
  };

  S.sup = {
    email: supEmail.value
  };

  const link = await approvalLink('supervisor');

  await emailjs.send(
    EMAILJS_SERVICE_ID,
    EMAILJS_TEMPLATE_ID,
    {
      to_email: S.sup.email,
      message: "Approve request: " + link
    }
  );

  alert("Submitted! Link sent.");
}

// ================= LOAD LINK =================
window.onload = async function(){

  const params = new URLSearchParams(window.location.search);
  const stage = params.get('s');
  const binId = params.get('b');

  if(stage && binId){

    const data = await loadStateCloud(binId);

    S.reqId = data.reqId;
    S.emp = data.emp;
    S.sup = data.sup;

    document.getElementById("approvalPanel").style.display="block";
    document.getElementById("summary").innerHTML =
      "<b>Employee:</b> " + S.emp.name;
  }
};

// ================= APPROVE =================
function approve(){
  alert("Approved successfully!");
}

</script>

</body>
</html>
